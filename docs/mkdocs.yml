site_name: OceanDataStore Documentation
site_url: https://noc-msm.github.io/OceanDataStore/

repo_url: https://github.com/NOC-MSM/OceanDataStore
repo_name: OceanDataStore
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/icons/noc_logo.png
  favicon: assets/icons/favicon.ico
  icon:
    edit: material/pencil 
    view: material/eye
    repo: fontawesome/brands/git-alt
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - content.action.edit
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - toc.integrate
    - navigation.tabs
    - navigation.expand
    - navigation.footer
    - search.suggest
  palette:
    # Light Mode (system preference)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch
        name: Light Mode
      primary: red
      accent: light blue

    # Dark Mode (system preference)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch-off-outline
        name: Dark Mode
      primary: red
      accent: light blue

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - md_in_html
  - pymdownx.blocks.caption

nav:
  - Getting started: index.md
  - User Guide:
    - catalog_guide.md
    - cli_guide.md
  - Examples:
    - OceanDataCatalog_example.ipynb
  - Reference:
    - catalog_reference.md
    - cli_reference.md

plugins:
  - search
  - glightbox
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            docstring_section_style: "table"
            filters: "public"
            separate_signature: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_root_heading: true
            summary: true
            allow_inspection: false
          paths: [../OceanDataStore]
  - mkdocs-jupyter:
      include_source: True

extra:
  social:
    - icon: fontawesome/brands/github 
      link: https://github.com/NOC-MSM/OceanDataStore
      name: GitHub

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js